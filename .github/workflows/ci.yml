name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: pwsh

env:
  DOTNET_NOLOGO: true

jobs:
  ghalint:
    name: ghalint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: tools/ghalint/go.mod
      - name: Install ghalint
        run: |
          $goModPath = 'tools/ghalint/go.mod'
          $versionLine = Get-Content $goModPath | Where-Object { $_ -match 'github\.com/suzuki-shunsuke/ghalint\s+v\d+\.\d+\.\d+' } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($versionLine)) {
            throw "Unable to resolve ghalint version from $goModPath."
          }

          $version = [regex]::Match($versionLine, 'github\.com/suzuki-shunsuke/ghalint\s+(v\d+\.\d+\.\d+(?:[-+][^\s]+)?)').Groups[1].Value
          go install "github.com/suzuki-shunsuke/ghalint/cmd/ghalint@$version"
          Join-Path (go env GOPATH) 'bin' | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Run ghalint
        run: ghalint run

  build-test:
    name: Build and test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Restore
        run: dotnet restore Ghpmv.slnx
      - name: Build
        run: dotnet build Ghpmv.slnx -c Release --no-restore -warnaserror
      - name: Test deterministic suites
        run: |
          dotnet test tests/Ghpmv.Core.Tests/Ghpmv.Core.Tests.csproj -c Release --no-build --logger trx
          dotnet test tests/Ghpmv.Browser.Tests/Ghpmv.Browser.Tests.csproj -c Release --no-build --filter "Category!=E2E" --logger trx
      - name: Test real GitHub API integration
        if: ${{ matrix.os == 'ubuntu-latest' }}
        env:
          GHPMV_TEST_TOKEN: ${{ secrets.GHPMV_TEST_TOKEN || secrets.GPM_TEST_TOKEN }}
          GHPMV_TEST_ORG: ${{ vars.GHPMV_TEST_ORG || vars.GPM_TEST_ORG || 'gpm-source' }}
          GHPMV_TEST_PROJECT_NUMBER: ${{ vars.GHPMV_TEST_PROJECT_NUMBER || vars.GPM_TEST_PROJECT_NUMBER || '89' }}
          GHPMV_TEST_FIXTURE_REPO: ${{ vars.GHPMV_TEST_FIXTURE_REPO || vars.GPM_TEST_FIXTURE_REPO || 'fixture-repo2' }}
          GHPMV_TEST_TARGET_ORG: ${{ vars.GHPMV_TEST_TARGET_ORG || vars.GPM_TEST_TARGET_ORG || 'gpm-target' }}
          GHPMV_TEST_TARGET_FIXTURE_REPO: ${{ vars.GHPMV_TEST_TARGET_FIXTURE_REPO || vars.GPM_TEST_TARGET_FIXTURE_REPO || 'fixture-repo' }}
        run: dotnet test tests/Ghpmv.Integration.Tests/Ghpmv.Integration.Tests.csproj -c Release --no-build --logger trx
      - name: Upload test result logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ matrix.os }}
          path: tests/**/TestResults/**
          if-no-files-found: warn
          retention-days: 7

  publish:
    name: Publish (${{ matrix.rid }})
    needs: build-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            smoke: true
          - os: windows-latest
            rid: win-arm64
            smoke: false # cross-publish; cannot run on x64 runner
          - os: ubuntu-latest
            rid: linux-x64
            smoke: true
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Publish self-contained (${{ matrix.rid }})
        run: dotnet publish src/Ghpmv.Cli -c Release --self-contained true -r ${{ matrix.rid }} -o artifacts/sc-${{ matrix.rid }}
      - name: Publish framework-dependent (portable)
        run: dotnet publish src/Ghpmv.Cli -c Release --self-contained false -o artifacts/fdd
      - name: Smoke test (self-contained)
        if: ${{ matrix.smoke }}
        shell: pwsh
        run: |
          $exe = Join-Path 'artifacts' "sc-${{ matrix.rid }}" ($IsWindows ? 'ghpmv.exe' : 'ghpmv')
          & $exe --version
          if ($LASTEXITCODE -ne 0) { exit 1 }
      - name: Smoke test (framework-dependent)
        shell: pwsh
        run: |
          dotnet artifacts/fdd/ghpmv.dll --version
          if ($LASTEXITCODE -ne 0) { exit 1 }
