name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true

jobs:
  release-preflight:
    name: Check release immutability preconditions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Require a new release or empty draft
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          $releaseJson = gh release view $env:TAG --repo $env:REPOSITORY --json isDraft,assets 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No existing GitHub Release found for $env:TAG."
            exit 0
          }

          $release = $releaseJson | ConvertFrom-Json
          $assetCount = @($release.assets).Count

          if (-not $release.isDraft) {
            throw "GitHub Release '$env:TAG' is already published. Use a new tag for corrected assets."
          }

          if ($assetCount -gt 0) {
            throw "Draft GitHub Release '$env:TAG' already has $assetCount asset(s). Delete the draft before rerunning, or use a new tag."
          }

          Write-Host "Found an empty draft GitHub Release for $env:TAG; it can be reused."

  publish-self-contained:
    needs: release-preflight
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            smoke: true
          - os: windows-latest
            rid: win-arm64
            smoke: false # cross-publish; cannot run on an x64 runner
          - os: ubuntu-latest
            rid: linux-x64
            smoke: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Restore
        run: dotnet restore src/Gpm.Cli -r ${{ matrix.rid }}
      - name: Publish self-contained (${{ matrix.rid }})
        shell: pwsh
        run: dotnet publish src/Gpm.Cli -c Release --no-restore --self-contained true -r ${{ matrix.rid }} -o "stage/gpm-${{ github.ref_name }}-${{ matrix.rid }}"
      - name: Smoke test
        if: ${{ matrix.smoke }}
        shell: pwsh
        run: |
          $exe = Join-Path 'stage' "gpm-${{ github.ref_name }}-${{ matrix.rid }}" ($IsWindows ? 'gpm.exe' : 'gpm')
          & $exe --version
          if ($LASTEXITCODE -ne 0) { exit 1 }
          & $exe export --help
          if ($LASTEXITCODE -ne 0) { exit 1 }
      - name: Archive (zip)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Compress-Archive -Path "stage/gpm-${{ github.ref_name }}-${{ matrix.rid }}" -DestinationPath "dist/gpm-${{ github.ref_name }}-${{ matrix.rid }}.zip"
      - name: Archive (tar.gz)
        if: ${{ runner.os != 'Windows' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          tar -czf "dist/gpm-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz" -C stage "gpm-${{ github.ref_name }}-${{ matrix.rid }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sc-${{ matrix.rid }}
          path: dist/*
          if-no-files-found: error

  publish-framework-dependent:
    needs: release-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Restore
        run: dotnet restore src/Gpm.Cli
      - name: Publish framework-dependent (portable)
        shell: pwsh
        run: dotnet publish src/Gpm.Cli -c Release --no-restore --self-contained false -o "stage/gpm-${{ github.ref_name }}-portable"
      - name: Smoke test
        shell: pwsh
        run: |
          dotnet "stage/gpm-${{ github.ref_name }}-portable/gpm.dll" --version
          if ($LASTEXITCODE -ne 0) { exit 1 }
          dotnet "stage/gpm-${{ github.ref_name }}-portable/gpm.dll" export --help
          if ($LASTEXITCODE -ne 0) { exit 1 }
      - name: Archive (zip)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Push-Location stage
          zip -r "../dist/gpm-${{ github.ref_name }}-portable.zip" "gpm-${{ github.ref_name }}-portable"
          Pop-Location
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fdd-portable
          path: dist/*
          if-no-files-found: error

  pack-tool:
    needs: release-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Restore
        run: dotnet restore Gpm.slnx
      - name: Pack NuGet global tool
        run: dotnet pack src/Gpm.Cli -c Release --no-restore -o dist
      - name: Smoke test (install from local package)
        shell: pwsh
        run: |
          dotnet tool install --global gpm --add-source dist
          gpm --version
          if ($LASTEXITCODE -ne 0) { exit 1 }
          gpm export --help
          if ($LASTEXITCODE -ne 0) { exit 1 }
      # NuGet.org publishing is prepared but disabled until the NUGET_API_KEY secret is configured.
      - name: Push to NuGet.org (disabled)
        if: ${{ false }}
        run: dotnet nuget push dist/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nupkg
          path: dist/*.nupkg
          if-no-files-found: error

  release:
    needs: [publish-self-contained, publish-framework-dependent, pack-tool]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS.txt
        shell: pwsh
        run: |
          Push-Location dist
          Get-ChildItem -File | Sort-Object Name | ForEach-Object {
            "{0}  {1}" -f (Get-FileHash $_ -Algorithm SHA256).Hash.ToLowerInvariant(), $_.Name
          } | Set-Content -Path SHA256SUMS.txt
          Get-Content SHA256SUMS.txt
          Pop-Location
      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*
          generate_release_notes: true
